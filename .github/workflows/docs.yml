name: Generate Doxygen Docs and Deploy to Pages

on:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu repozytorium
        uses: actions/checkout@v4

      - name: Instalacja Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Generowanie dokumentacji
        run: doxygen Doxyfile

      - name: Przygotowanie plików do publikacji
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/html' 

  deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Publikacja na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4